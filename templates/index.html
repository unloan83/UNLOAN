<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>unloan | Secure Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-slate-50">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-700">₹ unloan</h1>
      <div class="space-x-4">
        <button class="text-sm text-indigo-700" onclick="showPage('entry')">Home</button>
        <button class="text-sm text-indigo-700" onclick="showPage('admin-login')">Admin</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4 space-y-6">
    <section id="entry" class="card">
      <h2 class="text-xl font-bold mb-3">Entry Profile</h2>
      <div class="grid md:grid-cols-3 gap-3">
        <input id="name" placeholder="Name" class="input" />
        <input id="age" type="number" placeholder="Age" class="input" />
        <input id="mobile" placeholder="Mobile" class="input" />
      </div>
      <div class="grid md:grid-cols-3 gap-3 mt-3">
        <input id="dependents" type="number" placeholder="Dependents" class="input" value="0" />
        <select id="maritalStatus" class="input"><option value="single">Single</option><option value="married">Married</option></select>
        <select id="inputMode" class="input"><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select>
      </div>
      <div class="grid md:grid-cols-2 gap-3 mt-3">
        <label class="input flex items-center gap-2"><input id="hasHealthInsurance" type="checkbox" /> Health insurance available</label>
        <label class="input flex items-center gap-2"><input id="hasTermInsurance" type="checkbox" /> Term insurance available</label>
      </div>
      <button class="btn mt-4" onclick="showPage('financial')">Next</button>
    </section>

    <section id="financial" class="card hidden">
      <h2 class="text-xl font-bold mb-3">Financial Inputs</h2>
      <div class="grid md:grid-cols-4 gap-3">
        <input id="income" type="number" class="input" placeholder="Income" />
        <input id="rent" type="number" class="input" placeholder="Rent / EMI" />
        <input id="food" type="number" class="input" placeholder="Food + Utilities" />
        <input id="misc" type="number" class="input" placeholder="Lifestyle + Misc" />
      </div>
      <h3 class="font-semibold mt-4 mb-2">Milestones</h3>
      <div id="milestonesBox" class="grid md:grid-cols-2 gap-3"></div>
      <button class="btn mt-4" onclick="generatePlan()">Generate Plan</button>
    </section>

    <section id="summary" class="hidden">
      <div class="grid lg:grid-cols-3 gap-4">
        <div class="card lg:col-span-2">
          <h2 class="text-xl font-bold">Health Score: <span id="healthScore">0</span>/100</h2>
          <p id="healthNote" class="text-sm text-gray-600 mt-1"></p>
          <ul id="insights" class="list-disc pl-5 mt-3 text-sm"></ul>
          <div class="mt-4">
            <label><input id="consult" type="checkbox" /> Discuss next steps with us</label>
          </div>
          <button class="btn mt-4" onclick="savePlan()">Save Plan</button>
        </div>
        <div class="card">
          <h3 class="font-semibold mb-2">Wealth Spread</h3>
          <div class="h-40"><canvas id="chart"></canvas></div>
          <p class="text-xs text-gray-500 mt-2">Compact view</p>
        </div>
      </div>
    </section>

    <section id="admin-login" class="card hidden max-w-md">
      <h2 class="text-xl font-bold mb-3">Admin Login</h2>
      <input id="adminUser" class="input mb-2" placeholder="Username" />
      <input id="adminPass" type="password" class="input" placeholder="Password" />
      <button class="btn mt-3" onclick="adminLogin()">Login</button>
    </section>

    <section id="admin" class="card hidden">
      <h2 class="text-xl font-bold mb-3">Admin Records</h2>
      <table class="w-full text-sm border">
        <thead><tr class="bg-gray-100"><th>Name</th><th>Age</th><th>Mobile</th><th>Score</th><th>Date</th></tr></thead>
        <tbody id="adminBody"></tbody>
      </table>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
