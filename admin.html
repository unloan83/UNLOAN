<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unloan | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6C63FF; --success: #1DD1A1; --danger: #FF4757; --gradient: linear-gradient(135deg, #6C63FF 0%, #00D2D3 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 25px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .config-box { background: white; padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        textarea { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-family: monospace; font-size: 12px; margin: 15px 0; }
        .btn { padding: 15px 30px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; background: var(--gradient); color: white; margin-right: 10px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 800; color: var(--primary); }
        table { width: 100%; background: white; border-radius: 20px; overflow: hidden; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .alert { padding: 15px; border-radius: 12px; margin: 15px 0; }
        .alert-success { background: rgba(29, 209, 161, 0.1); color: var(--success); }
        .alert-error { background: rgba(255, 71, 87, 0.1); color: var(--danger); }
        .hidden { display: none; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 50px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin: 20px 0; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <div class="logo" style="margin-bottom: 20px;">unloan Admin</div>
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn" onclick="verifyAdmin()">🔐 Login</button>
        <div id="loginError" class="alert alert-error hidden" style="margin-top: 15px;">❌ Wrong password</div>
        <p style="margin-top: 20px; color: #888; font-size: 12px;">Default: unloan2024</p>
    </div>
</div>

<!-- Dashboard -->
<div class="container hidden" id="adminDashboard">
    <div class="header">
        <div class="logo">unloan Admin</div>
        <button class="btn" onclick="logout()" style="background: #eee; color: #333;">🚪 Logout</button>
    </div>

    <div class="config-box">
        <h3>🔥 Firebase Configuration</h3>
        <p style="color: #888; margin: 10px 0;">Paste your Firebase config from Firebase Console → Project Settings</p>
        <textarea id="firebaseConfig" rows="8" placeholder='{
        "apiKey": "AIzaSyB2X_QYodQDt-huUpHDxuDg7K2ADPuNnSk",
        "authDomain": "unloan-6ee77.firebaseapp.com",
        "projectId": "unloan-6ee77",
        "storageBucket": "unloan-6ee77.firebasestorage.app",
        "messagingSenderId": "1094363896252",
        "appId": "1:1094363896252:web:f8c5cf52b3f270bfdcf3b9"
}'></textarea>
        <button class="btn" onclick="saveConfig()">💾 Save Config</button>
        <button class="btn" onclick="testConnection()" style="background: var(--success);">🔌 Test Connection</button>
        <div id="testResult" class="alert hidden"></div>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="stat-value" id="totalUsers">0</div><div>Total Users</div></div>
        <div class="stat-card"><div class="stat-value" id="avgScore">0</div><div>Avg Score</div></div>
        <div class="stat-card"><div class="stat-value" id="avgIncome">₹0</div><div>Avg Income</div></div>
        <div class="stat-card"><div class="stat-value" id="totalGoals">0</div><div>Total Goals</div></div>
    </div>

    <div style="background: white; border-radius: 20px; overflow: hidden;">
        <div style="padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
            <h3>📊 User Submissions</h3>
            <div>
                <button class="btn" onclick="loadData()" style="background: var(--primary);">🔄 Refresh</button>
                <button class="btn" onclick="exportCSV()" style="background: var(--success);">📥 Export CSV</button>
            </div>
        </div>
        <table>
            <thead>
                <tr><th>Date</th><th>Name</th><th>Age</th><th>Mobile</th><th>Income</th><th>Score</th><th>Goals</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const ADMIN_PASSWORD = 'unloan2024';
    let db = null;
    let allData = [];

    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('unloanAdminAuth') === 'true') {
            showDashboard();
        }
        const saved = localStorage.getItem('unloanFirebaseConfig');
        if (saved) {
            document.getElementById('firebaseConfig').value = saved;
            initFirebase(JSON.parse(saved));
        }
    });

    window.verifyAdmin = () => {
        if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            localStorage.setItem('unloanAdminAuth', 'true');
            document.getElementById('loginError').classList.add('hidden');
            showDashboard();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    };

    function showDashboard() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('adminDashboard').classList.remove('hidden');
        loadData();
    }

    window.logout = () => {
        localStorage.removeItem('unloanAdminAuth');
        location.reload();
    };

    window.saveConfig = () => {
        try {
            const config = JSON.parse(document.getElementById('firebaseConfig').value);
            localStorage.setItem('unloanFirebaseConfig', JSON.stringify(config));
            initFirebase(config);
            alert('✅ Config saved!');
        } catch (e) {
            alert('❌ Invalid JSON. Copy from Firebase Console.');
        }
    };

    function initFirebase(config) {
        try {
            const app = initializeApp(config);
            db = getFirestore(app);
            console.log('✅ Firebase initialized');
        } catch (e) {
            console.error('❌ Firebase init failed:', e);
        }
    }

    window.testConnection = async () => {
        const result = document.getElementById('testResult');
        if (!db) {
            result.className = 'alert alert-error';
            result.innerHTML = '❌ Firebase not initialized. Save config first.';
            result.classList.remove('hidden');
            return;
        }
        try {
            const snapshot = await getDocs(collection(db, 'submissions'));
            result.className = 'alert alert-success';
            result.innerHTML = `✅ Connected! Documents: ${snapshot.size}`;
            result.classList.remove('hidden');
        } catch (e) {
            result.className = 'alert alert-error';
            result.innerHTML = `❌ Error: ${e.message}<br><br><strong>Fix:</strong> Update Firestore Rules in Firebase Console:<br><code>allow read, write: if true;</code>`;
            result.classList.remove('hidden');
        }
    };

    window.loadData = async () => {
        if (!db) { alert('Configure Firebase first'); return; }
        try {
            const q = query(collection(db, 'submissions'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);
            allData = [];
            snapshot.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
            updateStats();
            renderTable();
        } catch (e) {
            alert('Error: ' + e.message);
        }
    };

    function updateStats() {
        document.getElementById('totalUsers').innerText = allData.length;
        document.getElementById('avgScore').innerText = Math.round(allData.reduce((s, u) => s + (u.ai?.score || 0), 0) / (allData.length || 1));
        document.getElementById('avgIncome').innerText = '₹' + Math.round(allData.reduce((s, u) => s + (u.income || 0), 0) / (allData.length || 1)).toLocaleString();
        document.getElementById('totalGoals').innerText = allData.reduce((s, u) => s + (u.milestones?.length || 0), 0);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = allData.length === 0 ? '<tr><td colspan="7" style="text-align:center;padding:40px;">No data yet</td></tr>' :
            allData.map(u => `<tr>
                <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A'}</td>
                <td><strong>${u.name || 'N/A'}</strong></td>
                <td>${u.age || '-'}</td>
                <td>${u.mobile || '-'}</td>
                <td>₹${(u.income || 0).toLocaleString()}</td>
                <td>${u.ai?.score || 0}</td>
                <td>${u.milestones?.length || 0}</td>
            </tr>`).join('');
    }

    window.exportCSV = () => {
        if (allData.length === 0) { alert('No data'); return; }
        let csv = 'Date,Name,Age,Mobile,Income,Score,Goals\n';
        allData.forEach(u => csv += `${u.createdAt || ''},${u.name || ''},${u.age || ''},${u.mobile || ''},${u.income || 0},${u.ai?.score || 0},${u.milestones?.length || 0}\n`);
        const link = document.createElement('a');
        link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
        link.download = `unloan_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    };
</script>
</body>
</html>
