<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const ADMIN_PASSWORD = 'unloan2024';
    let db = null;
    let allUserData = [];

    // Check auth on load
    window.addEventListener('DOMContentLoaded', () => {
        console.log('🔍 Admin page loaded');
        const isAuth = localStorage.getItem('unloanAdminAuth');
        if (isAuth === 'true') {
            showDashboard();
        }

        // Load saved config
        const savedConfig = localStorage.getItem('unloanFirebaseConfig');
        if (savedConfig) {
            try {
                const config = JSON.parse(savedConfig);
                document.getElementById('firebaseConfig').value = savedConfig;
                initializeFirebase(config);
            } catch (error) {
                console.error('❌ Failed to parse saved config:', error);
            }
        }
    });

    window.verifyAdmin = function() {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            localStorage.setItem('unloanAdminAuth', 'true');
            document.getElementById('loginError').classList.add('hidden');
            showDashboard();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    };

    window.showDashboard = function() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('adminDashboard').classList.remove('hidden');
        loadData();
    };

    window.logout = function() {
        localStorage.removeItem('unloanAdminAuth');
        location.reload();
    };

    window.saveFirebaseConfig = function() {
        try {
            const configText = document.getElementById('firebaseConfig').value.trim();
            const config = JSON.parse(configText);
            
            // Validate required fields
            if (!config.apiKey || !config.projectId) {
                throw new Error('Missing required fields (apiKey, projectId)');
            }
            
            localStorage.setItem('unloanFirebaseConfig', configText);
            initializeFirebase(config);
            alert('✅ Firebase config saved!');
        } catch (error) {
            alert('❌ Invalid JSON format.\n\nCopy the entire firebaseConfig object from Firebase Console.\n\nError: ' + error.message);
        }
    };

    function initializeFirebase(config) {
        try {
            console.log('🔥 Initializing Firebase...');
            console.log('📋 Project ID:', config.projectId);
            
            const app = initializeApp(config);
            db = getFirestore(app);
            console.log('✅ Firebase initialized successfully');
            updateFirebaseStatus(true);
        } catch (error) {
            console.error('❌ Firebase init failed:', error);
            updateFirebaseStatus(false);
            throw error;
        }
    }

    window.testFirebaseConnection = async function() {
        const resultDiv = document.getElementById('firebaseTestResult');
        const statusDiv = document.getElementById('firebaseStatus');

        if (!db) {
            resultDiv.className = 'alert alert-error';
            resultDiv.innerHTML = '❌ Firebase not initialized. Save config first.';
            resultDiv.classList.remove('hidden');
            return;
        }

        resultDiv.className = 'alert alert-info';
        resultDiv.innerHTML = '🔄 Testing connection...';
        resultDiv.classList.remove('hidden');

        try {
            console.log('🔍 Testing Firestore connection...');
            const q = query(collection(db, 'submissions'));
            const querySnapshot = await getDocs(q);
            
            console.log('✅ Connection successful!');
            console.log('📊 Documents found:', querySnapshot.size);
            
            resultDiv.className = 'alert alert-success';
            resultDiv.innerHTML = `✅ Firebase Connected!<br>Collections: submissions<br>Documents: ${querySnapshot.size}`;
            resultDiv.classList.remove('hidden');
            updateFirebaseStatus(true);
            
        } catch (error) {
            console.error('❌ Connection test failed:', error);
            
            let errorMessage = error.message;
            let troubleshooting = '';
            
            if (error.code === 'permission-denied') {
                errorMessage = 'Permission denied';
                troubleshooting = '<br><br><strong>Fix:</strong><br>1. Go to Firebase Console<br>2. Firestore Database → Rules<br>3. Replace rules with:<br><code>allow read, write: if true;</code><br>4. Click Publish';
            } else if (error.code === 'unavailable') {
                errorMessage = 'Cannot connect to Firebase';
                troubleshooting = '<br><br><strong>Fix:</strong><br>1. Check internet connection<br>2. Check Firebase status';
            } else if (error.code === 'invalid-argument') {
                errorMessage = 'Invalid configuration';
                troubleshooting = '<br><br><strong>Fix:</strong><br>1. Re-copy config from Firebase Console<br>2. Ensure all fields are present';
            }
            
            resultDiv.className = 'alert alert-error';
            resultDiv.innerHTML = `❌ Connection failed:<br><strong>${errorMessage}</strong>${troubleshooting}`;
            resultDiv.classList.remove('hidden');
            updateFirebaseStatus(false);
        }
    };

    function updateFirebaseStatus(online) {
        const statusDiv = document.getElementById('firebaseStatus');
        if (online) {
            statusDiv.className = 'status-indicator status-online';
            statusDiv.innerHTML = '<i class="fas fa-circle"></i> <span>Online</span>';
        } else {
            statusDiv.className = 'status-indicator status-offline';
            statusDiv.innerHTML = '<i class="fas fa-circle"></i> <span>Offline</span>';
        }
    }

    window.loadData = async function() {
        if (!db) {
            alert('⚠️ Firebase not configured. Save config first.');
            return;
        }

        document.getElementById('tableLoading').classList.remove('hidden');
        document.getElementById('tableContent').classList.add('hidden');

        try {
            console.log('📥 Loading data from Firestore...');
            const q = query(collection(db, 'submissions'), orderBy('createdAt', 'desc'));
            const querySnapshot = await getDocs(q);

            allUserData = [];
            querySnapshot.forEach((doc) => {
                allUserData.push({ id: doc.id, ...doc.data() });
            });

            console.log('✅ Loaded', allUserData.length, 'submissions');

            updateStats();
            renderTable();

        } catch (error) {
            console.error('❌ Load error:', error);
            
            let errorMessage = error.message;
            if (error.code === 'permission-denied') {
                errorMessage = 'Permission denied. Update Firestore rules in Firebase Console.';
            }
            
            alert('Error loading  ' + errorMessage);
            document.getElementById('tableLoading').innerHTML = `
                <i class="fas fa-exclamation-triangle" style="color: var(--warning); font-size: 48px;"></i>
                <p style="margin-top: 20px; color: #888;">${errorMessage}</p>
                <button class="btn btn-primary" onclick="loadData()" style="margin-top: 15px;">🔄 Retry</button>
            `;
        } finally {
            document.getElementById('tableLoading').classList.add('hidden');
            document.getElementById('tableContent').classList.remove('hidden');
        }
    };

    function updateStats() {
        document.getElementById('totalUsers').innerText = allUserData.length;
        const avgScore = allUserData.reduce((sum, user) => sum + (user.ai?.score || 0), 0) / (allUserData.length || 1);
        document.getElementById('avgScore').innerText = Math.round(avgScore);
        const avgIncome = allUserData.reduce((sum, user) => sum + (user.income || 0), 0) / (allUserData.length || 1);
        document.getElementById('avgIncome').innerText = '₹' + Math.round(avgIncome).toLocaleString('en-IN');
        const totalGoals = allUserData.reduce((sum, user) => sum + (user.milestones?.length || 0), 0);
        document.getElementById('totalGoals').innerText = totalGoals;
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (allUserData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 40px; color: #888;">No submissions yet</td></tr>';
            return;
        }

        allUserData.forEach((user, index) => {
            const scoreClass = user.ai?.score > 70 ? 'score-high' : (user.ai?.score > 40 ? 'score-medium' : 'score-low');
            const goalsCount = user.milestones?.length || 0;
            const date = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${date}</td>
                <td><strong>${user.name || 'N/A'}</strong></td>
                <td>${user.age || '-'}</td>
                <td>${user.mobile || '-'}</td>
                <td>₹${(user.income || 0).toLocaleString('en-IN')}</td>
                <td>₹${(user.totalExpenses || 0).toLocaleString('en-IN')}</td>
                <td style="color: ${user.disposable > 0 ? 'var(--success)' : 'var(--danger)'}">₹${(user.disposable || 0).toLocaleString('en-IN')}</td>
                <td>${goalsCount}</td>
                <td><span class="score-badge ${scoreClass}">${user.ai?.score || 0}</span></td>
                <td>
                    <button class="btn" style="padding: 8px 15px; background: #eee;" onclick="window.viewUser(${index})">
                        <i class="fas fa-eye"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.viewUser = function(index) {
        const user = allUserData[index];
        const details = `
Name: ${user.name}
Age: ${user.age}
Mobile: ${user.mobile}
Income: ₹${user.income}
Expenses: ₹${user.totalExpenses}
Disposable: ₹${user.disposable}
Health Score: ${user.ai?.score}
Goals: ${user.milestones?.map(m => m.type).join(', ') || 'None'}
        `.trim();
        alert(details);
    };

    window.exportAllData = function() {
        if (allUserData.length === 0) {
            alert('No data to export');
            return;
        }

        let csv = "text/csv;charset=utf-8,Timestamp,Name,Age,Mobile,Income,Expenses,Disposable,Score,Goals\n";
        allUserData.forEach(user => {
            csv += `${user.createdAt || ''},${user.name || ''},${user.age || ''},${user.mobile || ''},${user.income || 0},${user.totalExpenses || 0},${user.disposable || 0},${user.ai?.score || 0},${user.milestones?.length || 0}\n`;
        });

        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csv));
        link.setAttribute("download", `unloan_all_users_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };
</script>
